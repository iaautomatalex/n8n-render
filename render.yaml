services:
  - type: web
    name: openclaw
    env: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    branch: main
    numInstances: 1
    healthCheckPath: /
    envVars:
      # ── Gateway ────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: CLAWDBOT_GATEWAY_BIND
        value: 0.0.0.0
      - key: GATEWAY_BIND
        value: lan
      - key: PORT
        value: 18789
      - key: CLAWDBOT_GATEWAY_TOKEN
        generateValue: true          # généré automatiquement par Render

      # ── Google Gemini ──────────────────────────────────────────
      - key: GOOGLE_API_KEY
        sync: false                  # à remplir dans le dashboard Render

      # ── Supabase ───────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false                  # ex: https://xxxx.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false                  # clé anon publique Supabase
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false                  # clé service role (privée)
      - key: DATABASE_URL
        sync: false                  # postgresql://postgres:[pwd]@db.[ref].supabase.co:5432/postgres

      # ── Bots optionnels ────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
